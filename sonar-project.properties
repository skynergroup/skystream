sonar.projectKey=skynergroup_skystream
sonar.organization=skynergroup

# Project metadata
sonar.projectName=skystream
sonar.projectVersion=2.0.0

# Source code location
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx
sonar.coverage.exclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx,**/main.jsx

# JavaScript/TypeScript coverage
sonar.javascript.lcov.reportPaths=./coverage/lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8
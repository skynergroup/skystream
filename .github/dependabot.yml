version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "yashiels"
      - "MphoCodes"
      - "skynergroup/senior"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "yashiels"
      - "MphoCodes"
      - "skynergroup/senior"
    labels:
      - "ci"
    commit-message:
      prefix: "chore(ci):"

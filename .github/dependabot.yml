version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      root-dependencies:
        patterns:
          - "*"
    reviewers:
      - "yashiels"
      - "MphoCodes"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      web-dependencies:
        patterns:
          - "*"
    reviewers:
      - "yashiels"
      - "MphoCodes"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "npm"
    directory: "/apps/mobile"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      mobile-dependencies:
        patterns:
          - "*"
    reviewers:
      - "yashiels"
      - "MphoCodes"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "yashiels"
      - "MphoCodes"
    labels:
      - "ci"
    commit-message:
      prefix: "chore(ci):"

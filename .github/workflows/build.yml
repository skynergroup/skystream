name: Build

on:
  push:
    branches:
      - production
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build & Test
    runs-on: [self-hosted, Linux, X64, astra]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

  # Wrapper jobs to satisfy branch protection and ruleset required checks
  ci-complete:
    name: CI Complete
    needs: build
    runs-on: [self-hosted, Linux, X64, astra]
    steps:
      - run: echo "Build succeeded — CI Complete"

  pr-checks-complete:
    name: PR Checks Complete
    needs: build
    runs-on: [self-hosted, Linux, X64, astra]
    steps:
      - run: echo "Build succeeded — PR Checks Complete"

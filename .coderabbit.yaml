# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-GB
tone_instructions: ''
early_access: false
enable_free_tier: true

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: false
  high_level_summary_placeholder: <!-- Autogenerated coderabbit summary placeholder -->
  high_level_summary_in_walkthrough: true
  auto_title_placeholder: '@coderabbitai'
  auto_title_instructions: ''
  review_status: true
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: true
  auto_assign_reviewers: false
  poem: true
  labeling_instructions: []
  abort_on_close: true
  disable_cache: false

  path_filters:
    - '!**/node_modules/**'
    - '!**/dist/**'
    - '!**/coverage/**'
    - '!**/package-lock.json'
    - '!**/*.min.js'

  path_instructions:
    - path: 'src/components/**'
      instructions: >
        React 19 functional components using JSX. Enforce:
        - Functional components and hooks only — no class components.
        - Named exports preferred; default export only for page-level components.
        - No inline styles that duplicate existing CSS classes.
        - Check for missing key props in list renders.
        - Flag any direct DOM manipulation (use React state/refs instead).
        - Check accessibility: ARIA labels on interactive elements, keyboard navigation,
          sufficient colour contrast references.
        - useCallback/useMemo only where there is a measurable perf reason — flag
          unnecessary memoization.

    - path: 'src/pages/**'
      instructions: >
        Page-level React components (Search, Discover, LiveTV).
        Each page is responsible for its own document title and SEO meta via useSeoMeta.
        Ensure every page calls useSeoMeta with accurate title, description, and
        canonical URL. Flag missing or generic meta values.
        Check that analytics.trackPageView is called on mount.

    - path: 'src/services/**'
      instructions: >
        API service layer (TMDB, streaming embed URL generation).
        - All fetch calls must handle non-ok responses and network errors.
        - No API keys or tokens hardcoded — use VITE_ env vars only.
        - Streaming URL builders: verify URL structure matches the provider docs.
        - Flag any domain strings that aren't sourced from the vidsrcMirrors array.

    - path: 'src/utils/**'
      instructions: >
        Utility functions and hooks. Pure functions must be pure — no side effects.
        Hooks must follow the Rules of Hooks. Flag any useEffect with missing
        dependency array entries. useSeoMeta specifically: ensure DOM operations are
        safely wrapped in typeof window checks for SSR compatibility.

    - path: 'src/**/__tests__/**'
      instructions: >
        Jest + React Testing Library tests.
        - Avoid testing implementation details — test behaviour.
        - No snapshot tests unless explicitly justified.
        - Mock at the module boundary, not at the function level where possible.
        - Ensure async tests use proper await/findBy patterns, not arbitrary timeouts.
        - Flag any hardcoded domain strings in tests — use constants from the service.

    - path: '.github/workflows/**'
      instructions: >
        GitHub Actions workflows. Check:
        - All third-party actions are pinned to a version tag (not @main/@master).
        - No secrets echoed to logs.
        - Self-hosted runner jobs labelled correctly ([self-hosted, Linux, X64, apollo]).
        - Build artefacts are not committed back to the repo.

    - path: 'vercel.json'
      instructions: >
        Vercel deployment config. The catch-all rewrite (/* → /index.html) is
        intentional for SPA routing — do not flag it as a security issue.
        Ensure any new headers don't break the existing CSP in index.html.

    - path: 'index.html'
      instructions: >
        Entry HTML. Validate:
        - CSP frame-src includes all active streaming embed domains.
        - og:image and twitter:image point to an accessible URL.
        - JSON-LD structured data is valid schema.org markup.
        - No render-blocking scripts (async/defer where possible).

    - path: 'public/**'
      instructions: >
        Static public assets. robots.txt and sitemap.xml must be valid.
        No sensitive files (env, credentials) in this directory.

  auto_review:
    enabled: true
    auto_incremental_review: false
    ignore_title_keywords: []
    labels: []
    drafts: false
    base_branches: []
    ignore_usernames: []

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: true

  pre_merge_checks:
    docstrings:
      mode: off
    title:
      mode: warning
      requirements: >
        PR titles must follow '<type>(<scope>): <subject>'.
        type ∈ {build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test}.
        scope: one of {search, discover, live-tv, player, embed, seo, auth, ci, deps, config}.
        subject: concise, imperative, ideally ≤ 72 chars.
        Examples: feat(player): add server 7 videasy fallback
                  fix(embed): update vidsrc primary to vsembed.ru
                  ci: replace sonarqube with coderabbit
    description:
      mode: warning
    issue_assessment:
      mode: warning
    custom_checks: []

  tools:
    ast-grep:
      essential_rules: true
      packages: []
    shellcheck:
      enabled: true
    ruff:
      enabled: false         # No Python
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    languagetool:
      enabled: true
      enabled_rules: []
      disabled_rules: []
      enabled_categories: []
      disabled_categories: []
      enabled_only: false
      level: default
    biome:
      enabled: true
    hadolint:
      enabled: false         # No Dockerfiles
    swiftlint:
      enabled: false
    phpstan:
      enabled: false         # No PHP
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    golangci-lint:
      enabled: false
    yamllint:
      enabled: true
    gitleaks:
      enabled: true          # Flag any accidental credential commits
    checkov:
      enabled: true
    detekt:
      enabled: false
    eslint:
      enabled: true
    flake8:
      enabled: false
    rubocop:
      enabled: false
    buf:
      enabled: false
    regal:
      enabled: false
    actionlint:
      enabled: true          # Validates GitHub Actions workflow syntax
    pmd:
      enabled: false
    cppcheck:
      enabled: false
    semgrep:
      enabled: true
    circleci:
      enabled: false
    clippy:
      enabled: false
    sqlfluff:
      enabled: false
    prismaLint:
      enabled: false
    pylint:
      enabled: false
    oxc:
      enabled: true          # Fast JS/JSX linter
    shopifyThemeCheck:
      enabled: false
    luacheck:
      enabled: false
    brakeman:
      enabled: false
    dotenvLint:
      enabled: true
    htmlhint:
      enabled: true          # Validates index.html and public HTML
    checkmake:
      enabled: false
    osvScanner:
      enabled: true          # Dependency vulnerability scanning

chat:
  art: true
  auto_reply: true
  integrations:
    jira:
      usage: auto
    linear:
      usage: auto

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns: []
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
  mcp:
    usage: auto
    disabled_servers: []

code_generation:
  docstrings:
    language: en-GB
    path_instructions: []
  unit_tests:
    path_instructions: []
